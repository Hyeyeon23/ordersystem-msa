apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordering-depl
  namespace: dev
spec:
  replicas: 1
#  deployment의 selector 객체가 관리할 pod 지정
  selector:
    matchLabels:
      app: ordering
#      pod (= container) 정의
  template:
    metadata:
      labels:
#        pod name 지정
#        이 값과 위 selector.matchLabels.app 의 값은 일치해야함
        app: ordering
    spec:
      containers:
        - name: ordering-container
          image: 221082171363.dkr.ecr.ap-southeast-2.amazonaws.com/ordering-service:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "500Mi"
            requests:
              cpu: "0.5"
              memory: "250Mi"
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: DB_HOST
            - name: DB_PW
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: DB_PW
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ordering-service
  namespace: dev
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: ordering