apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: my-issuer
  namespace: dev
spec:
  acme:
    server:
    email: hypark023@gmail.com
    privateKeySecretRef:
      name: my-issuer
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: server-dev-com-tls
  namespace: dev
spec:
  secretName: server-dev-com-tls
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: my-issuer
    kind: ClusterIssuer
  commonName: test.groundi.net
  dnsNames:
    - test.groundi.net













