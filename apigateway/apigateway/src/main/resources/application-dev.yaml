
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
#      CORS 처리 . 서비스 모듈에서는 웹 브라우저와 직접 통신하지 않으므로 따리 처리해주지 않아도 좋은
      globalcors:
        cors-configuration:
          '[/**]':
            allowedOrigins:
              - 'http://localhost:3000'
            allowedMethods: '*'
            allowedHeaders: '*'
            allowedCredentials: true
          routes:
            - id: member-service
              predicates:
                - Path=/member-service/**
              filters:
#                ScriptPrefix : 첫번째 접두어를 제거 후에 member-service로 http 요청
                -StripPrefix=1
#              유레카에 member-service란 이름으로 등록된 서버의 주소
              uri: lb://member-service
            - id: ordering-service
              predicates:
                - Path =/ordering-service/**
              filters:
                - StripPrefix=1
              uri: lb://ordering-service/**
            - id: product-service
              predicates:
                - Path=/product-service/**
              filters:
                - StripPrefix=1
              uri: lb://product-service
